<div class="navbar">
  <div class="flex-none">
    <label [for]="appDrawer" aria-label="open sidebar" class="btn btn-square btn-ghost">
      <div class="indicator">
        @if (numActiveOrders > 0) {
        <p class="indicator-item badge badge-xs badge-success rounded-full">
          <b>{{ numActiveOrders }}</b>
        </p>
        }

        <fa-icon class="text-xl" icon="bars"></fa-icon>
      </div>
    </label>
  </div>

  <div class="px-2 flex-1">
    <div class="flex justify-between items-center gap-2">
      <app-logo firstName="Bake" lastName="Sale" (onClick)="onClickHome()" />

      <div class="flex gap-2 items-center">
        @if (user.userRole != userRole.Guest) {
        <button class="btn btn-square btn-ghost text-2xl" (click)="openBottomSheet()">
          <div class="indicator">
            <p class="indicator-item badge badge-xs badge-warning rounded-full">
              <b>2</b>
            </p>

            <fa-icon icon="bell"></fa-icon>
          </div>
        </button>
        }

        <label [for]="checkoutDrawer" aria-label="open sidebar" class="btn btn-square btn-ghost text-2xl">
          <div class="indicator">
            @if (numItems > 0) {
            <p class="indicator-item badge badge-xs badge-warning rounded-full">
              <b>{{ numItems }}</b>
            </p>
            }
            <fa-icon icon="shopping-cart"></fa-icon>
          </div>
        </label>
      </div>
    </div>
  </div>
</div>
